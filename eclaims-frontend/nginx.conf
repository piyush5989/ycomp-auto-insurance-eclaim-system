server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy       "strict-origin" always;

    # ── Proxy /api → Spring Boot backend ───────────────────────────────────
    # In Docker Compose the backend container is named "eclaims-backend".
    # The NGINX container and backend share the eclaims-net bridge network.
    location /api {
        proxy_pass         http://eclaims-backend:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        # Pass the Correlation-ID header back to the browser
        proxy_pass_header  X-Correlation-ID;
    }

    # ── Actuator health — expose only the liveness probe, not full metrics ──
    location /actuator/health/liveness {
        proxy_pass http://eclaims-backend:8090;
    }

    # ── Static assets — long-lived cache (Vite fingerprints file names) ─────
    location ~* \.(js|css|woff2?|ttf|eot|otf|ico|svg|png|jpg|jpeg|webp|gif)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ── SPA fallback — React Router handles all non-asset paths ─────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Compression ──────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    expired no-cache no-store private auth;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript
                    image/svg+xml;
}
