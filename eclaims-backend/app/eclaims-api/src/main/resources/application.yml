spring:
  application:
    name: eclaims-api

  # Java 21 Virtual Threads — near-Node.js concurrency levels
  # Directly addresses 200M customer scale — no explicit async code needed for I/O-bound operations
  threads:
    virtual:
      enabled: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 25MB

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: claims
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  mail:
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

# Actuator — separate liveness and readiness probes (Kubernetes-ready)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: db,redis,kafka    # Readiness: all deps healthy
        liveness:
          include: ping              # Liveness: JVM alive only
  metrics:
    tags:
      application: eclaims-api

# Structured logging with MDC correlation ID
logging:
  pattern:
    console: "%d{ISO8601} [%X{correlationId:-no-correlation}] [%X{userId:-anonymous}] %-5level %logger{36} - %msg%n"
  level:
    com.yclaims: INFO
    org.springframework.security: WARN
    org.apache.kafka: WARN
    org.hibernate.SQL: WARN

# SpringDoc OpenAPI (Swagger UI)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
  info:
    title: eClaims API
    description: Enterprise eClaims Processing System — 7 bounded-context modules
    version: v1.0.0

# eClaims application properties
eclaims:
  api:
    base-url: ${ECLAIMS_API_BASE_URL:http://localhost:8090}
  storage:
    path: ${ECLAIMS_STORAGE_PATH:./uploads}
    max-file-size-bytes: 5242880       # 5 MB hard limit
    max-documents-per-claim: 10
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
      - application/pdf
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
  keycloak:
    admin-url: ${KEYCLOAK_URL:http://localhost:8080}
    realm: ${KEYCLOAK_REALM:eclaims}
    admin-username: ${KEYCLOAK_ADMIN_USER:admin}
    admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}
    authz:
      audience: ${KEYCLOAK_AUTHZ_AUDIENCE:eclaims-api}
  payments:
    processing-fee: ${ECLAIMS_PROCESSING_FEE:10.00}  # Configurable processing fee per claim payment
