# Production profile — all sensitive values via environment variables
# Never commit secrets to source control

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10

  jpa:
    hibernate:
      ddl-auto: validate   # Never auto-create in production

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: eclaims-prod
      auto-offset-reset: latest
    producer:
      # acks=all: leader waits for all in-sync replicas before acking — no data loss
      acks: all
      properties:
        # Requires 2 replicas to be in-sync before acking (with replicas=3, tolerates 1 broker failure)
        min.insync.replicas: 2
        # Retries with backoff — handles transient broker unavailability
        retries: 3
        retry.backoff.ms: 1000

eclaims:
  kafka:
    replicas: 3
  minio:
    endpoint: ${MINIO_ENDPOINT}          # e.g. https://s3.amazonaws.com (use AWS SDK for S3)
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET:eclaims-documents}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}

  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8090

logging:
  level:
    com.yclaims: INFO
    org.springframework.security: WARN

eclaims:
  api:
    base-url: ${ECLAIMS_API_BASE_URL}
  storage:
    path: ${ECLAIMS_STORAGE_PATH:/tmp/eclaims-uploads}
