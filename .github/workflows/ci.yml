name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Allow one concurrent run per branch; cancel in-progress runs on new pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/eclaims-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/eclaims-frontend
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

# ─── Job 1: Backend — Compile + Unit Tests ───────────────────────────────────
jobs:
  backend-ci:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eclaims-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      # Compile all modules + run unit tests + ArchUnit architecture checks
      - name: Build and test
        run: ./mvnw clean verify -B -Dstyle.color=always

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: eclaims-backend/**/target/surefire-reports/
          retention-days: 7

# ─── Job 2: Frontend — Type-check + Lint + Build ─────────────────────────────
  frontend-ci:
    name: Frontend — Type-check, Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eclaims-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: eclaims-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint (zero warnings policy)
        run: npm run lint

      # Build with production Keycloak coords — override via repo variables if needed
      - name: Build
        run: npm run build
        env:
          VITE_KEYCLOAK_URL: ${{ vars.VITE_KEYCLOAK_URL || 'http://localhost:8080' }}
          VITE_KEYCLOAK_REALM: ${{ vars.VITE_KEYCLOAK_REALM || 'eclaims' }}
          VITE_KEYCLOAK_CLIENT_ID: ${{ vars.VITE_KEYCLOAK_CLIENT_ID || 'eclaims-web' }}

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: eclaims-frontend/dist/
          retention-days: 3

# ─── Job 3: Docker — Build & Push to GHCR ────────────────────────────────────
# Runs only on pushes to main (not on PRs) after both CI jobs pass.
  docker-build-push:
    name: Docker — Build & Push
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend image ───────────────────────────────────────────────────
      - name: Extract metadata — backend
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push — backend
        uses: docker/build-push-action@v5
        with:
          context: eclaims-backend
          file: eclaims-backend/Dockerfile
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          # Reuse GitHub Actions cache across builds — cuts image build time ~60%
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      # ── Frontend image ──────────────────────────────────────────────────
      - name: Extract metadata — frontend
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push — frontend
        uses: docker/build-push-action@v5
        with:
          context: eclaims-frontend
          file: eclaims-frontend/Dockerfile
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          # Keycloak URL is baked into the JS bundle at image build time.
          # Set VITE_KEYCLOAK_URL in Settings → Variables → Actions for cloud deployments.
          build-args: |
            VITE_KEYCLOAK_URL=${{ vars.VITE_KEYCLOAK_URL || 'http://localhost:8080' }}
            VITE_KEYCLOAK_REALM=${{ vars.VITE_KEYCLOAK_REALM || 'eclaims' }}
            VITE_KEYCLOAK_CLIENT_ID=${{ vars.VITE_KEYCLOAK_CLIENT_ID || 'eclaims-web' }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      # ── Summary ─────────────────────────────────────────────────────────
      - name: Job summary
        run: |
          echo "## Docker images pushed" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | \`${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}\`  |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

# ─── Job 4: Deploy — POC Environment ─────────────────────────────────────────
# Placeholder — wire up your actual deployment target here.
# Uses a GitHub Environment ("poc") so you can add a required-reviewer approval gate.
  deploy:
    name: Deploy — POC
    needs: [docker-build-push]
    runs-on: ubuntu-latest
    environment: poc   # configure protection rules in Settings → Environments
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

