name: CI/CD

on:
  push:
    branches: [main, develop, ci-cd]
  pull_request:
    branches: [main, develop, ci-cd]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/eclaims-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/eclaims-frontend
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  backend-ci:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eclaims-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build and test
        run: ./mvnw clean verify -B -Dstyle.color=always

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: eclaims-backend/**/target/surefire-reports/
          retention-days: 7

  frontend-ci:
    name: Frontend — Type-check, Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eclaims-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: eclaims-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint (zero warnings policy)
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_KEYCLOAK_URL: ${{ vars.VITE_KEYCLOAK_URL || 'http://localhost:8080' }}
          VITE_KEYCLOAK_REALM: ${{ vars.VITE_KEYCLOAK_REALM || 'eclaims' }}
          VITE_KEYCLOAK_CLIENT_ID: ${{ vars.VITE_KEYCLOAK_CLIENT_ID || 'eclaims-web' }}

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: eclaims-frontend/dist/
          retention-days: 3

  docker-publish:
    name: Docker — GHCR (+ ECR for ECS)
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/ci-cd')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata — backend
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push — backend (GHCR)
        uses: docker/build-push-action@v5
        with:
          context: eclaims-backend
          file: eclaims-backend/Dockerfile
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Extract metadata — frontend
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push — frontend (GHCR)
        uses: docker/build-push-action@v5
        with:
          context: eclaims-frontend
          file: eclaims-frontend/Dockerfile
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          build-args: |
            NGINX_CONFIG=nginx.conf
            VITE_KEYCLOAK_URL=${{ vars.VITE_KEYCLOAK_URL || 'http://localhost:8080' }}
            VITE_KEYCLOAK_REALM=${{ vars.VITE_KEYCLOAK_REALM || 'eclaims' }}
            VITE_KEYCLOAK_CLIENT_ID=${{ vars.VITE_KEYCLOAK_CLIENT_ID || 'eclaims-web' }}
          cache-from: type=gha,scope=frontend-ghcr
          cache-to: type=gha,scope=frontend-ghcr,mode=max

      - name: Configure AWS credentials (OIDC)
        if: vars.AWS_ROLE_ARN != '' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci-cd')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: ECR login and registry URL
        id: ecr-registry
        if: vars.AWS_ROLE_ARN != '' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci-cd')
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REG="${ACCOUNT}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com"
          aws ecr get-login-password --region "${{ vars.AWS_REGION }}" | docker login --username AWS --password-stdin "$REG"
          echo "registry=$REG" >> "$GITHUB_OUTPUT"

      - name: Ensure ECR repositories
        if: vars.AWS_ROLE_ARN != '' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci-cd')
        run: |
          for R in eclaims-backend eclaims-frontend; do
            aws ecr describe-repositories --repository-names "$R" --region "${{ vars.AWS_REGION }}" 2>/dev/null \
              || aws ecr create-repository --repository-name "$R" --region "${{ vars.AWS_REGION }}"
          done

      - name: Build and push — backend (ECR)
        if: vars.AWS_ROLE_ARN != '' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci-cd')
        uses: docker/build-push-action@v5
        with:
          context: eclaims-backend
          file: eclaims-backend/Dockerfile
          push: true
          tags: ${{ steps.ecr-registry.outputs.registry }}/eclaims-backend:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build and push — frontend (ECR, ECS sidecar nginx)
        if: vars.AWS_ROLE_ARN != '' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci-cd')
        uses: docker/build-push-action@v5
        with:
          context: eclaims-frontend
          file: eclaims-frontend/Dockerfile
          push: true
          tags: ${{ steps.ecr-registry.outputs.registry }}/eclaims-frontend:sha-${{ steps.sha.outputs.short }}
          build-args: |
            NGINX_CONFIG=nginx.ecs.conf
            VITE_KEYCLOAK_URL=${{ vars.VITE_KEYCLOAK_URL || 'http://localhost:8080' }}
            VITE_KEYCLOAK_REALM=${{ vars.VITE_KEYCLOAK_REALM || 'eclaims' }}
            VITE_KEYCLOAK_CLIENT_ID=${{ vars.VITE_KEYCLOAK_CLIENT_ID || 'eclaims-web' }}
          cache-from: type=gha,scope=frontend-ecs
          cache-to: type=gha,scope=frontend-ecs,mode=max

      - name: Summary — images
        run: |
          echo "## Docker images" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry | Backend | Frontend |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| GHCR | \`${{ env.BACKEND_IMAGE }}:sha-${{ steps.sha.outputs.short }}\` | \`${{ env.FRONTEND_IMAGE }}:sha-${{ steps.sha.outputs.short }}\` |" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.ecr-registry.outputs.registry }}" ]; then
            echo "| ECR | \`${{ steps.ecr-registry.outputs.registry }}/eclaims-backend:sha-${{ steps.sha.outputs.short }}\` | \`${{ steps.ecr-registry.outputs.registry }}/eclaims-frontend:sha-${{ steps.sha.outputs.short }}\` |" >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy-ecs:
    name: Deploy — ECS Fargate
    needs: [docker-publish]
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci-cd') &&
      vars.AWS_ROLE_ARN != '' &&
      vars.ECS_CLUSTER != '' &&
      vars.ECS_SERVICE != '' &&
      vars.ECS_TASK_FAMILY != ''
    runs-on: ubuntu-latest
    environment: poc
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve ECR image URIs
        id: images
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REG="${ACCOUNT}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com"
          SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          echo "backend=${REG}/eclaims-backend:sha-${SHORT}" >> "$GITHUB_OUTPUT"
          echo "frontend=${REG}/eclaims-frontend:sha-${SHORT}" >> "$GITHUB_OUTPUT"

      - name: Fetch and patch task definition
        run: |
          set -euo pipefail
          aws ecs describe-task-definition \
            --task-definition "${{ vars.ECS_TASK_FAMILY }}" \
            --region "${{ vars.AWS_REGION }}" \
            --query taskDefinition \
            --output json > td.json
          jq 'del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy,
            .deregisteredAt
          )' td.json > td-clean.json
          jq --arg B "${{ steps.images.outputs.backend }}" --arg F "${{ steps.images.outputs.frontend }}" \
            '(.containerDefinitions[] | select(.name=="eclaims-backend") | .image) = $B
             | (.containerDefinitions[] | select(.name=="eclaims-frontend") | .image) = $F' \
            td-clean.json > td-new.json
          jq -e '[.containerDefinitions[].name] | (index("eclaims-backend") != null) and (index("eclaims-frontend") != null)' td-new.json > /dev/null

      - name: Register task definition
        id: reg
        run: |
          ARN=$(aws ecs register-task-definition \
            --region "${{ vars.AWS_REGION }}" \
            --cli-input-json file://td-new.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "arn=$ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --region "${{ vars.AWS_REGION }}" \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_SERVICE }}" \
            --task-definition "${{ steps.reg.outputs.arn }}" \
            --force-new-deployment

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --region "${{ vars.AWS_REGION }}" \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services "${{ vars.ECS_SERVICE }}"

      - name: Optional smoke test
        if: vars.POC_ALB_URL != ''
        run: |
          set -euo pipefail
          BASE="${{ vars.POC_ALB_URL }}"
          BASE="${BASE%/}"
          curl -fsS "$BASE/actuator/health/readiness" | head -c 2000
          echo
